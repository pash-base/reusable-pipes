name: Reusable — Release QA

on:
  workflow_call:

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  validate:
    name: 🧪 Validate
    if: github.event.pull_request.merged == true
    runs-on: [self-hosted, linux, homelab]
    steps:
      - uses: actions/checkout@v4

      - name: Install pash-pipe
        run: |
          source ~/.zshrc 2>/dev/null || true
          rm -rf /tmp/reusable-pipes
          git clone --branch master https://x-access-token:${GH_TOKEN}@github.com/pash-base/reusable-pipes.git /tmp/reusable-pipes
          pip install -e /tmp/reusable-pipes/app --quiet
                    echo "$HOME/.asdf/shims" >> $GITHUB_PATH
          asdf reshim python 2>/dev/null || true
          echo "PYTHONPATH=/tmp/reusable-pipes/app:$PYTHONPATH" >> $GITHUB_ENV

      - name: Validate (install + fmt + lint + test + cover)
        run: |
          source ~/.zshrc 2>/dev/null || true
          pash-pipe validate --path app/.pashfile

  deploy-homolog:
    name: 🚀 Deploy → Homologation
    if: github.event.pull_request.merged == true
    runs-on: [self-hosted, linux, homelab]
    needs: validate
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Install pash-pipe
        run: |
          source ~/.zshrc 2>/dev/null || true
          rm -rf /tmp/reusable-pipes
          git clone --branch master https://x-access-token:${GH_TOKEN}@github.com/pash-base/reusable-pipes.git /tmp/reusable-pipes
          pip install -e /tmp/reusable-pipes/app --quiet
                    echo "$HOME/.asdf/shims" >> $GITHUB_PATH
          asdf reshim python 2>/dev/null || true
          echo "PYTHONPATH=/tmp/reusable-pipes/app:$PYTHONPATH" >> $GITHUB_ENV

      - name: Configurar identidade git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Login no GHCR
        run: |
          mkdir -p ~/.docker
          echo '{"credsStore":""}' > ~/.docker/config.json
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build imagem
        run: |
          source ~/.zshrc 2>/dev/null || true
          pash-pipe build --tag ${{ github.sha }} --path app/.pashfile
        env:
          REGISTRY: ghcr.io

      - name: Push imagem
        run: |
          source ~/.zshrc 2>/dev/null || true
          pash-pipe push --tag ${{ github.sha }} --path app/.pashfile
        env:
          REGISTRY: ghcr.io

      - name: Atualizar image tag (hom)
        run: |
          source ~/.zshrc 2>/dev/null || true
          pash-pipe update-image-tag --env hom --tag ${{ github.sha }} --path app/.pashfile --branch ${{ github.base_ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolver nome da app ArgoCD (hom)
        id: resolve
        run: |
          source ~/.zshrc 2>/dev/null || true
          APP_NAME=$(pash-pipe resolve-app-names --path app/.pashfile --env hom --output json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['hom'])")
          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT

      - name: Atualizar targetRevision via GitOps (platform-config)
        run: |
          source ~/.zshrc 2>/dev/null || true
          BRANCH="${{ github.base_ref }}"
          APP_NAME=${{ steps.resolve.outputs.app_name }}
          SIGLA=$(echo "${APP_NAME}" | cut -d- -f1)
          SHORTNAME=$(echo "${APP_NAME}" | cut -d- -f2,3)
          CONFIG_FILE="argocd/applications/${SIGLA}/${SHORTNAME}/${APP_NAME}.yaml"
          echo "Atualizando ${APP_NAME} targetRevision → ${BRANCH} via GitOps"
          rm -rf /tmp/platform-config
          git clone --depth 1 https://x-access-token:${GH_TOKEN}@github.com/pash-base/platform-config.git /tmp/platform-config
          git -C /tmp/platform-config config user.email "github-actions[bot]@users.noreply.github.com"
          git -C /tmp/platform-config config user.name "github-actions[bot]"
          python3 -c "
import yaml
path = f'/tmp/platform-config/{CONFIG_FILE}'
with open(path) as f:
    data = yaml.safe_load(f)
for s in data['spec']['sources']:
    if 'ref' in s and s['ref'] == 'values':
        s['targetRevision'] = '${BRANCH}'
with open(path, 'w') as f:
    yaml.dump(data, f, default_flow_style=False)
print(f'  targetRevision atualizado para ${BRANCH}')
"
          git -C /tmp/platform-config add -A
          git -C /tmp/platform-config commit -m "chore(gitops): update ${APP_NAME} targetRevision → ${BRANCH}"
          git -C /tmp/platform-config push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sincronizar app-of-apps (propagar targetRevision)
        run: |
          source ~/.zshrc 2>/dev/null || true
          echo "Disparando sync do app-of-apps para propagar mudança no platform-config"
          curl -s -X POST "$ARGOCD_URL/api/v1/applications/app-of-apps/sync" \
            -H "Authorization: Bearer $ARGOCD_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{}' -o /dev/null -w "HTTP %{http_code}\n"
        env:
          ARGOCD_INSECURE: "true"

      - name: Sync ArgoCD (hom)
        run: |
          source ~/.zshrc 2>/dev/null || true
          pash-pipe sync-argocd --app-name ${{ steps.resolve.outputs.app_name }}
        env:
          ARGOCD_INSECURE: "true"

  open-master-pr:
    name: 🚢 Open PR → master
    if: github.event.pull_request.merged == true
    runs-on: [self-hosted, linux, homelab]
    needs: deploy-homolog
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Create PR release → master (draft)
        run: |
          source ~/.zshrc 2>/dev/null || true
          RELEASE_BRANCH="${GITHUB_BASE_REF}"
          VERSION="${RELEASE_BRANCH#release/v}"

          EXISTING=$(gh pr list --head "$RELEASE_BRANCH" --base master --json number --jq 'length')
          if [ "$EXISTING" -eq 0 ]; then
            {
              printf "## 🚢 Release v%s → Production\n\n" "$VERSION"
              printf '%s\n\n%s\n\n' "---" "## Histórias"
              printf "História(s): [<hist001>]\n\n"
              printf '%s\n\n%s\n\n' "---" "### Ambientes"
              printf "| Ambiente | Status |\n|---|---|\n"
              printf "| Development | ✅ Deployed |\n"
              printf "| Homologation | ✅ Deployed |\n"
              printf "| Production | ⏳ Aguardando História(s) |\n\n"
              printf "### Checklist de Produção\n\n"
              printf '%s\n' "- [ ] História(s) preenchida(s)"
              printf '%s\n' "- [ ] Aprovação do time"
              printf '%s\n' "- [ ] Janela de manutenção confirmada"
              printf '%s\n' "- [ ] Rollback plan documentado"
            } > /tmp/master-pr-body.md
            gh pr create \
              --base master \
              --head "$RELEASE_BRANCH" \
              --title "PR - release/v${VERSION} -> master" \
              --body-file /tmp/master-pr-body.md \
              --draft
          fi
