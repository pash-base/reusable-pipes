name: Reusable — Production Gate

on:
  workflow_call:

permissions:
  contents: write
  pull-requests: write
  statuses: write
  packages: write

jobs:
  check-story-id:
    name: 🎫 Check Story ID
    runs-on: [self-hosted, linux, homelab]
    outputs:
      has_story_id: ${{ steps.check.outputs.has_story_id }}
      story_id: ${{ steps.check.outputs.story_id }}
    steps:
      - name: Parse Story ID from PR body
        id: check
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if echo "$PR_BODY" | grep -qP '<hist\d+>'; then
            echo "has_story_id=false" >> $GITHUB_OUTPUT
            echo "## 🎫 Histórias" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **História(s) não definida(s). Substitua os placeholders em \`História(s):\` e edite a PR.**" >> $GITHUB_STEP_SUMMARY
          else
            STORY_ID=$(echo "$PR_BODY" | grep -oP 'História\(s\):\s*\[\K[^\]]+' || echo "UNKNOWN")
            echo "has_story_id=true" >> $GITHUB_OUTPUT
            echo "story_id=$STORY_ID" >> $GITHUB_OUTPUT
            echo "## 🎫 Histórias" >> $GITHUB_STEP_SUMMARY
            echo "✅ História(s) identificada(s): **\`${STORY_ID}\`**" >> $GITHUB_STEP_SUMMARY
          fi

  validate:
    name: 🧪 Validate
    runs-on: [self-hosted, linux, homelab]
    needs: check-story-id
    if: needs.check-story-id.outputs.has_story_id == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install pash-pipe
        run: |
          source ~/.zshrc 2>/dev/null || true
          rm -rf /tmp/reusable-pipes
          git clone --branch master https://x-access-token:${GH_TOKEN}@github.com/pash-base/reusable-pipes.git /tmp/reusable-pipes
          pip install -e /tmp/reusable-pipes/app --quiet
                    echo "$HOME/.asdf/shims" >> $GITHUB_PATH
          asdf reshim python 2>/dev/null || true
          echo "PYTHONPATH=/tmp/reusable-pipes/app:$PYTHONPATH" >> $GITHUB_ENV

      - name: Validate (install + fmt + lint + test + cover)
        run: |
          source ~/.zshrc 2>/dev/null || true
          pash-pipe validate --path app/.pashfile

  deploy-prod:
    name: 🚀 Deploy → Production
    runs-on: [self-hosted, linux, homelab]
    needs: [check-story-id, validate]
    if: needs.check-story-id.outputs.has_story_id == 'true'
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Install pash-pipe
        run: |
          source ~/.zshrc 2>/dev/null || true
          rm -rf /tmp/reusable-pipes
          git clone --branch master https://x-access-token:${GH_TOKEN}@github.com/pash-base/reusable-pipes.git /tmp/reusable-pipes
          pip install -e /tmp/reusable-pipes/app --quiet
                    echo "$HOME/.asdf/shims" >> $GITHUB_PATH
          asdf reshim python 2>/dev/null || true
          echo "PYTHONPATH=/tmp/reusable-pipes/app:$PYTHONPATH" >> $GITHUB_ENV

      - name: Configurar identidade git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Login no GHCR
        run: |
          mkdir -p ~/.docker
          echo '{"credsStore":""}' > ~/.docker/config.json
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build imagem
        run: |
          source ~/.zshrc 2>/dev/null || true
          pash-pipe build --tag ${{ github.sha }} --path app/.pashfile
        env:
          REGISTRY: ghcr.io

      - name: Push imagem
        run: |
          source ~/.zshrc 2>/dev/null || true
          pash-pipe push --tag ${{ github.sha }} --path app/.pashfile
        env:
          REGISTRY: ghcr.io

      - name: Atualizar image tag (prd)
        run: |
          source ~/.zshrc 2>/dev/null || true
          pash-pipe update-image-tag --env prd --tag ${{ github.sha }} --path app/.pashfile --branch ${{ github.head_ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolver nome da app ArgoCD (prd)
        id: resolve
        run: |
          source ~/.zshrc 2>/dev/null || true
          |
          APP_NAME=$(pash-pipe resolve-app-names --path app/.pashfile --env prd --output json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['prd'])")
          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT

      - name: Sync ArgoCD (prd)
        run: |
          source ~/.zshrc 2>/dev/null || true
          pash-pipe sync-argocd --app-name ${{ steps.resolve.outputs.app_name }}
        env:
          ARGOCD_INSECURE: "true"

  create-release-tag:
    name: 🏷️ Create GitHub Release
    runs-on: [self-hosted, linux, homelab]
    needs: [check-story-id, deploy-prod]
    if: needs.check-story-id.outputs.has_story_id == 'true'
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      STORY_ID: ${{ needs.check-story-id.outputs.story_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Criar tag e GitHub Release
        run: |
          source ~/.zshrc 2>/dev/null || true
          |
          VERSION="${GITHUB_HEAD_REF#release/v}"
          TAG="v${VERSION}"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git tag "$TAG" || true
          git push origin "$TAG" || true
          gh release create "$TAG" \
            --title "Release $TAG" \
            --notes "Deploy de produção — histórias: $STORY_ID" \
            --latest || true

      - name: Converter PR para ready (remover draft)
        run: |
          source ~/.zshrc 2>/dev/null || true
          |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          gh pr ready "$PR_NUMBER" || true
