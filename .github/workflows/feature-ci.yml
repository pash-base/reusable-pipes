name: Reusable â€” Feature CI

on:
  workflow_call:
    secrets:
      GITHUB_TOKEN:
        required: false

permissions:
  contents: read
  pull-requests: write

jobs:
  ci:
    name: đź”Ť CI â€” Quality & Tests
    runs-on: [self-hosted, linux, homelab]
    steps:
      - uses: actions/checkout@v4

      - name: Install pash-pipe
        run: |
          source ~/.zshrc 2>/dev/null || true
          rm -rf /tmp/reusable-pipes
          git clone --branch master https://x-access-token:${GH_TOKEN}@github.com/pash-base/reusable-pipes.git /tmp/reusable-pipes
          pip install -e /tmp/reusable-pipes/app --quiet
          echo "$HOME/.asdf/shims" >> $GITHUB_PATH
          asdf reshim python 2>/dev/null || true
          echo "PYTHONPATH=/tmp/reusable-pipes/app:$PYTHONPATH" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          source ~/.zshrc 2>/dev/null || true
          pash-pipe install --path app/.pashfile

      - name: Format check
        run: |
          source ~/.zshrc 2>/dev/null || true
          pash-pipe fmt --path app/.pashfile

      - name: Lint
        run: |
          source ~/.zshrc 2>/dev/null || true
          pash-pipe lint --path app/.pashfile

      - name: Unit Tests
        run: |
          source ~/.zshrc 2>/dev/null || true
          pash-pipe test --path app/.pashfile

  open-pr-to-develop:
    name: đź“¬ Open PR â†’ develop
    runs-on: [self-hosted, linux, homelab]
    needs: ci
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Create PR to develop (if not exists)
        run: |
          source ~/.zshrc 2>/dev/null || true
          BRANCH="${GITHUB_REF_NAME}"
          FEATURE_NAME="${BRANCH#feature/}"
          EXISTING=$(gh pr list --head "$BRANCH" --base develop --json number --jq 'length')
          if [ "$EXISTING" -eq 0 ]; then
            {
              printf "## đźš€ Feature: \`%s\`\n\n" "$FEATURE_NAME"
              printf "PR criada automaticamente apĂłs CI passar em \`%s\`.\n\n" "$BRANCH"
              printf "### âś… CI Results\n\n"
              printf "| Check | Status |\n|---|---|\n"
              printf "| Install | âś… OK |\n"
              printf "| Format | âś… OK |\n"
              printf "| Lint | âś… OK |\n"
              printf "| Unit Tests | âś… OK |\n\n"
              printf "### Checklist\n\n"
              printf '%s\n' "- [ ] Code review concluĂ­do"
              printf '%s\n' "- [ ] Testes de integraĂ§ĂŁo validados"
              printf '%s\n' "- [ ] DocumentaĂ§ĂŁo atualizada (se necessĂˇrio)"
            } > /tmp/pr-body.md
            LAST_COMMIT=$(git log -1 --format='%s')
            PR_URL=$(gh pr create \
              --base develop \
              --head "$BRANCH" \
              --title "PR - ${LAST_COMMIT}" \
              --body-file /tmp/pr-body.md)
            echo "## đź“¬ PR Criada" >> $GITHUB_STEP_SUMMARY
            echo "PR criada automaticamente: $PR_URL" >> $GITHUB_STEP_SUMMARY
          else
            echo "## đź“¬ PR jĂˇ existe" >> $GITHUB_STEP_SUMMARY
            echo "â„ąď¸Ź Uma PR para \`develop\` jĂˇ existe para esta branch." >> $GITHUB_STEP_SUMMARY
          fi
