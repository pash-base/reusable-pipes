name: Reusable — Feature CI

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: write

jobs:
  ci:
    name: 🔍 CI — Quality & Tests
    runs-on: [self-hosted, linux, homelab]
    steps:
      - uses: actions/checkout@v4

      - name: Install pash-pipe
        uses: actions/checkout@v4
        with:
          repository: pash-base/reusable-pipes
          path: /tmp/reusable-pipes
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pash-pipe
        run: pip install -e /tmp/reusable-pipes/app --quiet

      - name: Install dependencies
        run: pash-pipe install --path app/.pashfile

      - name: Format check
        run: pash-pipe fmt --path app/.pashfile

      - name: Lint
        run: pash-pipe lint --path app/.pashfile

      - name: Unit Tests
        run: pash-pipe test --path app/.pashfile

  open-pr-to-develop:
    name: 📬 Open PR → develop
    runs-on: [self-hosted, linux, homelab]
    needs: ci
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Create PR to develop (if not exists)
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          FEATURE_NAME="${BRANCH#feature/}"
          EXISTING=$(gh pr list --head "$BRANCH" --base develop --json number --jq 'length')
          if [ "$EXISTING" -eq 0 ]; then
            {
              printf "## 🚀 Feature: \`%s\`\n\n" "$FEATURE_NAME"
              printf "PR criada automaticamente após CI passar em \`%s\`.\n\n" "$BRANCH"
              printf "### ✅ CI Results\n\n"
              printf "| Check | Status |\n|---|---|\n"
              printf "| Install | ✅ OK |\n"
              printf "| Format | ✅ OK |\n"
              printf "| Lint | ✅ OK |\n"
              printf "| Unit Tests | ✅ OK |\n\n"
              printf "### Checklist\n\n"
              printf '%s\n' "- [ ] Code review concluído"
              printf '%s\n' "- [ ] Testes de integração validados"
              printf '%s\n' "- [ ] Documentação atualizada (se necessário)"
            } > /tmp/pr-body.md
            LAST_COMMIT=$(git log -1 --format='%s')
            PR_URL=$(gh pr create \
              --base develop \
              --head "$BRANCH" \
              --title "PR - ${LAST_COMMIT}" \
              --body-file /tmp/pr-body.md)
            echo "## 📬 PR Criada" >> $GITHUB_STEP_SUMMARY
            echo "PR criada automaticamente: $PR_URL" >> $GITHUB_STEP_SUMMARY
          else
            echo "## 📬 PR já existe" >> $GITHUB_STEP_SUMMARY
            echo "ℹ️ Uma PR para \`develop\` já existe para esta branch." >> $GITHUB_STEP_SUMMARY
          fi
