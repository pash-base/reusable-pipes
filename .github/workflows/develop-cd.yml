name: Reusable — Develop CD

on:
  workflow_call:

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    name: 🧪 Validate
    runs-on: [self-hosted, linux, homelab]
    steps:
      - uses: actions/checkout@v4

      - name: Install pash-pipe
        uses: actions/checkout@v4
        with:
          repository: pash-base/reusable-pipes
          path: /tmp/reusable-pipes
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pash-pipe
        run: pip install -e /tmp/reusable-pipes/app --quiet

      - name: Validate (install + fmt + lint + test + cover)
        run: pash-pipe validate --path app/.pashfile

  deploy-dev:
    name: 🚀 Deploy → Development
    runs-on: [self-hosted, linux, homelab]
    needs: validate
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Install pash-pipe
        uses: actions/checkout@v4
        with:
          repository: pash-base/reusable-pipes
          path: /tmp/reusable-pipes
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pash-pipe
        run: pip install -e /tmp/reusable-pipes/app --quiet

      - name: Configurar identidade git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Login no GHCR
        run: |
          mkdir -p ~/.docker
          echo '{"credsStore":""}' > ~/.docker/config.json
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build imagem
        run: pash-pipe build --tag ${{ github.sha }} --path app/.pashfile
        env:
          REGISTRY: ghcr.io

      - name: Push imagem
        run: pash-pipe push --tag ${{ github.sha }} --path app/.pashfile
        env:
          REGISTRY: ghcr.io

      - name: Atualizar image tag (dev)
        run: pash-pipe update-image-tag --env dev --tag ${{ github.sha }} --path app/.pashfile --branch develop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolver nome da app ArgoCD (dev)
        id: resolve
        run: |
          APP_NAME=$(pash-pipe resolve-app-names --path app/.pashfile --env dev --output json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['dev'])")
          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT

      - name: Sync ArgoCD (dev)
        run: pash-pipe sync-argocd --app-name ${{ steps.resolve.outputs.app_name }}
        env:
          ARGOCD_INSECURE: "true"

  create-release:
    name: 🏷️ Create Release Branch & PR
    runs-on: [self-hosted, linux, homelab]
    needs: deploy-dev
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master

      - name: Calculate next version
        id: version
        run: |
          LATEST=$(git ls-remote --heads origin 'refs/heads/release/v*' 2>/dev/null \
            | sed 's|.*refs/heads/release/v||' \
            | sort -V | tail -1)

          if [ -z "$LATEST" ]; then
            NEXT="0.1.0"
          else
            MAJOR=$(echo "$LATEST" | cut -d. -f1)
            MINOR=$(echo "$LATEST" | cut -d. -f2)
            PATCH=$(echo "$LATEST" | cut -d. -f3)
            NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          echo "version=$NEXT" >> $GITHUB_OUTPUT
          echo "branch=release/v${NEXT}" >> $GITHUB_OUTPUT

      - name: Create release branch from master
        run: |
          BRANCH="${{ steps.version.outputs.branch }}"
          EXISTING=$(git ls-remote --heads origin "$BRANCH" | wc -l)
          if [ "$EXISTING" -eq 0 ]; then
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            git checkout -b "$BRANCH"
            git push origin "$BRANCH"
          fi

      - name: Open PR develop → release
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH="${{ steps.version.outputs.branch }}"

          COMMIT_DIFF=$(git rev-list --count "origin/${BRANCH}..origin/develop" 2>/dev/null || echo 0)
          if [ "$COMMIT_DIFF" -eq 0 ]; then
            echo "ℹ️ develop não tem commits adicionais em relação a \`$BRANCH\`. PR pulada." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          EXISTING=$(gh pr list --head develop --base "$BRANCH" --json number --jq 'length')
          if [ "$EXISTING" -eq 0 ]; then
            {
              printf "## 🏷️ Release v%s\n\n" "$VERSION"
              printf "PR criada automaticamente após deploy em desenvolvimento.\n\n"
              printf "### Ambientes\n\n"
              printf "| Ambiente | Status |\n|---|---|\n"
              printf "| Development | ✅ Deployed |\n"
              printf "| Homologation | ⏳ Após merge desta PR |\n"
              printf "| Production | ⏳ Após aprovação em homolog |\n\n"
              printf "### Checklist\n\n"
              printf '%s\n' "- [ ] QA sign-off"
              printf '%s\n' "- [ ] Performance validado em dev"
              printf '%s\n' "- [ ] Documentação atualizada"
              printf '%s\n' "- [ ] Changelog revisado"
            } > /tmp/release-pr-body.md
            gh pr create \
              --base "$BRANCH" \
              --head develop \
              --title "PR - develop -> release/v${VERSION}" \
              --body-file /tmp/release-pr-body.md
          fi
