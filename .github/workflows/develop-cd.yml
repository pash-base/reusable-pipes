name: Reusable — Develop CD

on:
  workflow_call:

permissions:
  contents: write
  pull-requests: write

jobs:
  # ─────────────────────────────────────────────
  # 1. Validação (qualidade + testes unitários)
  # ─────────────────────────────────────────────
  unit-tests:
    name: 🧪 Validate
    runs-on: [self-hosted, linux, homelab]
    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependências e validar
        run: |
          cd app
          pip install -e . --quiet
          pip install pytest pytest-cov black flake8 --quiet
          make validate
        working-directory: ${{ github.workspace }}

  # ─────────────────────────────────────────────
  # 3. Deploy em desenvolvimento
  # ─────────────────────────────────────────────
  deploy-dev:
    name: 🚀 Deploy → Development
    runs-on: [self-hosted, linux, homelab]
    needs: unit-tests
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Instalar pash-pipe
        run: pip install -e . --quiet
        working-directory: ${{ github.workspace }}/../reusable-pipes/app

      - name: Parse .pashfile
        run: pash-pipe parse-pashfile --path app/.pashfile

      - name: Build image
        run: pash-pipe build --tag ${{ github.sha }} --path app/.pashfile

      - name: Push image
        run: pash-pipe push --tag ${{ github.sha }} --path app/.pashfile
        env:
          REGISTRY: ghcr.io

      - name: Atualizar image tag (dev)
        run: pash-pipe update-image-tag --env dev --tag ${{ github.sha }} --path app/.pashfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync ArgoCD (dev)
        run: pash-pipe sync-argocd --app-name portal-platform-dev
        env:
          ARGOCD_URL: ${{ secrets.ARGOCD_URL }}
          ARGOCD_TOKEN: ${{ secrets.ARGOCD_TOKEN }}
          ARGOCD_INSECURE: "true"

  # ─────────────────────────────────────────────
  # 4. Cria release branch e PR develop → release
  # ─────────────────────────────────────────────
  create-release:
    name: 🏷️ Create Release Branch & PR
    runs-on: [self-hosted, linux, homelab]
    needs: deploy-dev
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master

      - name: Calculate next version
        id: version
        run: |
          LATEST=$(git ls-remote --heads origin 'refs/heads/release/v*' 2>/dev/null \
            | sed 's|.*refs/heads/release/v||' \
            | sort -V | tail -1)

          if [ -z "$LATEST" ]; then
            NEXT="0.1.0"
          else
            MAJOR=$(echo "$LATEST" | cut -d. -f1)
            MINOR=$(echo "$LATEST" | cut -d. -f2)
            PATCH=$(echo "$LATEST" | cut -d. -f3)
            NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          echo "version=$NEXT" >> $GITHUB_OUTPUT
          echo "branch=release/v${NEXT}" >> $GITHUB_OUTPUT
          echo "🏷️ Próxima versão: **v${NEXT}**" >> $GITHUB_STEP_SUMMARY

      - name: Create release branch from master
        run: |
          BRANCH="${{ steps.version.outputs.branch }}"
          EXISTING=$(git ls-remote --heads origin "$BRANCH" | wc -l)

          if [ "$EXISTING" -eq 0 ]; then
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            git checkout -b "$BRANCH"
            git push origin "$BRANCH"
            echo "✅ Branch \`$BRANCH\` criada a partir de \`master\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ Branch \`$BRANCH\` já existe" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Open PR develop → release
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH="${{ steps.version.outputs.branch }}"

          COMMIT_DIFF=$(git rev-list --count "origin/${BRANCH}..origin/develop" 2>/dev/null || echo 0)
          if [ "$COMMIT_DIFF" -eq 0 ]; then
            echo "ℹ️ develop não tem commits adicionais em relação a \`$BRANCH\`. PR pulada." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          EXISTING=$(gh pr list --head develop --base "$BRANCH" --json number --jq 'length')
          if [ "$EXISTING" -eq 0 ]; then
            {
              printf "## 🏷️ Release v%s\n\n" "$VERSION"
              printf "PR criada automaticamente após deploy em desenvolvimento.\n\n"
              printf "### Ambientes\n\n"
              printf "| Ambiente | Status |\n|---|---|\n"
              printf "| Development | ✅ Deployed |\n"
              printf "| Homologation | ⏳ Após merge desta PR |\n"
              printf "| Production | ⏳ Após aprovação em homolog |\n\n"
              printf "### Checklist\n\n"
              printf '%s\n' "- [ ] QA sign-off"
              printf '%s\n' "- [ ] Performance validado em dev"
              printf '%s\n' "- [ ] Documentação atualizada"
              printf '%s\n' "- [ ] Changelog revisado"
            } > /tmp/release-pr-body.md
            PR_URL=$(gh pr create \
              --base "$BRANCH" \
              --head develop \
              --title "PR - develop -> release/v${VERSION}" \
              --body-file /tmp/release-pr-body.md)
            echo "## 🏷️ PR de Release Criada" >> $GITHUB_STEP_SUMMARY
            echo "PR criada: $PR_URL" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ PR de release já existe." >> $GITHUB_STEP_SUMMARY
          fi
